<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ForgeX | Reset Password</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="auth-page">

    <div class="auth-card">

        <img
            src="images/logo.png"
            alt="ForgeX Logo"
            class="auth-logo"
        >

        <h1>

            Reset Password 🔒

        </h1>

        <p>

            Enter your registered email and create a new password.

        </p>

        <form id="forgotPasswordForm">

            <!-- Email -->

            <div class="input-group">

                <label>

                    Registered Email

                </label>

                <input
                    type="email"
                    id="resetEmail"
                    placeholder="Enter your registered email"
                    required
                >

            </div>

            <!-- New Password -->

            <div class="input-group">

                <label>

                    New Password

                </label>

                <div class="password-box">

                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter new password"
                        required
                    >

                    <button
                        type="button"
                        id="toggleNewPassword"
                        class="toggle-password">

                        👁

                    </button>

                </div>

            </div>

            <!-- Confirm Password -->

            <div class="input-group">

                <label>

                    Confirm Password

                </label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmNewPassword"
                        placeholder="Confirm new password"
                        required
                    >

                    <button
                        type="button"
                        id="toggleConfirmPassword"
                        class="toggle-password">

                        👁

                    </button>

                </div>

            </div>

            <button
                type="submit"
                class="primary-btn auth-btn">

                Reset Password

            </button>

        </form>

        <div class="auth-footer">

            <a
                href="login.html"
                class="back-home">

                ← Back to Login

            </a>

        </div>

    </div>

</section>

<script src="forgot-password.js"></script>

</body>

</html>
