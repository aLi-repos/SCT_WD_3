<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quiz Result | ForgeX</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="result-container">

    <h1>🎉 Quiz Completed</h1>

    <h2 id="studentName">

        Congratulations!

    </h2>

    <div class="result-card">

        <h3>Your Score</h3>

        <p id="score">
            0 / 15
        </p>

        <h3>Percentage</h3>

        <p id="percentage">
            0%
        </p>

        <h3>Best Score</h3>

        <p id="bestScore">
            0 / 15
        </p>

        <h3>Total Attempts</h3>

        <p id="attempts">
            0
        </p>

        <h2 id="status">

            PASS

        </h2>

    </div>

    <div class="result-buttons">

        <a
        href="review.html"
        class="primary-btn">

            Review Answers

        </a>

        <a
        href="dashboard.html"
        class="secondary-btn">

            Dashboard

        </a>

    </div>

</div>

<script src="result.js"></script>

</body>

</html>
